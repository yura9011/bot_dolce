<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Humano - Dolce Party</title>
  <link rel="stylesheet" href="/css/main.css?v=3">
  <link rel="stylesheet" href="/css/chat-list.css?v=3">
  <link rel="stylesheet" href="/css/conversation.css?v=3">
  <link rel="stylesheet" href="/css/config.css?v=1">
</head>
<body>
  <div class="dashboard">
    <header class="header">
      <div id="testingBanner" class="testing-banner" style="display:none;">
        ⚠️ ENTORNO DE TESTING — Los datos NO son reales
      </div>
      <div class="header-left">
        <h1>🎈 Dolce Party - Santa Ana</h1>
      </div>
      <div class="header-right">
        <span id="userName">Usuario</span>
        <button id="logoutBtn" class="btn-logout">Salir</button>
      </div>
    </header>
    
    <div class="main-container">
      <aside class="chat-list">
        <div class="chat-list-header">
          <div class="tabs">
            <button id="tabChats" class="tab active">📱 Chats (<span id="chatCount">0</span>)</button>
            <button id="tabConfig" class="tab">⚙️ Config</button>
          </div>
          <input type="text" id="searchInput" placeholder="🔍 Buscar...">
        </div>
        <div id="chatListContainer" class="chat-list-items">
          <p class="no-chats">No hay chats activos</p>
        </div>
        <div id="configContainer" class="config-container" style="display: none;">
          <p class="no-chats">Cargando configuración...</p>
        </div>
      </aside>
      
      <main class="conversation-area">
        <div class="no-chat-selected">
          <p>Selecciona un chat para comenzar</p>
        </div>
        <div id="conversationContainer" class="conversation-container" style="display: none;">
          <div class="conversation-header">
            <h3 id="chatName">Cliente</h3>
            <span id="chatStatus" class="status-badge">🔴 Esperando</span>
          </div>
          <div id="messagesContainer" class="messages-container"></div>
          <div class="input-container">
            <textarea id="messageInput" placeholder="Escribe tu mensaje..." rows="1"></textarea>
            <button id="sendBtn" class="btn-send">Enviar</button>
            <button id="finishBtn" class="btn-finish">✅ MUCHAS GRACIAS</button>
          </div>
        </div>
        <div id="configPanel" class="config-panel" style="display: none;">
          <div class="config-header">
            <h2>⚙️ Administración de Números</h2>
            <p class="config-subtitle">Gestiona los números admin e ignorados del bot</p>
          </div>
          <div id="adminNumbersList" class="admin-numbers-list"></div>
          <button id="addNumberBtn" class="btn-add-number">➕ Agregar Número</button>
        </div>
      </main>
    </div>
  </div>
  
  <audio id="notificationSound" src="/assets/sounds/notification.mp3" preload="auto"></audio>
  
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/chat-list.js"></script>
  <script src="/js/conversation.js"></script>
  <script src="/js/websocket.js"></script>
  <script src="/js/config.js"></script>
  <script src="/js/notifications.js"></script>
</body>
</html>
