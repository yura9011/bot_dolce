<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Agente Humano - Dolce Party</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      height: 100vh;
      overflow: hidden;
    }

    .human-panel-container {
      display: flex;
      height: 100vh;
    }

    /* ─── PANEL IZQUIERDO: LISTA DE CHATS ─────────────────── */
    .chats-sidebar {
      width: 350px;
      background: white;
      border-right: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chats-header {
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .chats-header h2 {
      margin: 0 0 5px 0;
      font-size: 1.5rem;
    }

    .chats-header p {
      margin: 0;
      opacity: 0.9;
      font-size: 0.9rem;
    }

    .chats-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .chat-item {
      padding: 15px;
      margin-bottom: 8px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid transparent;
    }

    .chat-item:hover {
      background: #f5f5f5;
    }

    .chat-item.active {
      background: #e3f2fd;
      border-color: #2196f3;
    }

    .chat-item-handoff {
      border-left: 4px solid #ff9800;
    }

    .chat-item-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
    }

    .chat-item-name {
      font-weight: 600;
      color: #333;
    }

    .chat-item-time {
      font-size: 0.8rem;
      color: #999;
    }

    .chat-item-preview {
      font-size: 0.85rem;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .handoff-badge {
      display: inline-block;
      background: #ff9800;
      color: white;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.75rem;
      margin-top: 5px;
    }

    /* ─── PANEL DERECHO: CHAT ─────────────────────────────── */
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #e5ddd5;
      background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM12 86c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm28-65c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm23-11c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-6 60c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm29 22c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zM32 63c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm57-13c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5zm-9-21c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM60 91c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM35 41c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 60c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2z' fill='%23ffffff' fill-opacity='0.03' fill-rule='evenodd'/%3E%3C/svg%3E");
    }

    .chat-header {
      background: white;
      padding: 15px 20px;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    .chat-header-info h3 {
      margin: 0;
      font-size: 1.1rem;
    }

    .chat-header-info p {
      margin: 5px 0 0 0;
      font-size: 0.85rem;
      color: #666;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message-bubble {
      max-width: 65%;
      padding: 10px 15px;
      border-radius: 15px;
      word-wrap: break-word;
    }

    .message-user {
      align-self: flex-start;
      background: white;
      border-bottom-left-radius: 5px;
    }

    .message-bot {
      align-self: flex-end;
      background: #d9fdd3;
      border-bottom-right-radius: 5px;
    }

    .message-human {
      align-self: flex-end;
      background: #ff9800;
      color: white;
      border-bottom-right-radius: 5px;
    }

    .message-time {
      font-size: 0.7rem;
      color: #999;
      margin-top: 5px;
      text-align: right;
    }

    .chat-input-container {
      background: white;
      padding: 15px 20px;
      border-top: 1px solid #e0e0e0;
      display: flex;
      gap: 10px;
    }

    .chat-input {
      flex: 1;
      padding: 12px 15px;
      border: 1px solid #e0e0e0;
      border-radius: 25px;
      outline: none;
      font-size: 1rem;
    }

    .chat-input:focus {
      border-color: #667eea;
    }

    .btn-send {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 25px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }

    .btn-send:hover {
      background: #5568d3;
    }

    .btn-resolve {
      background: #4caf50;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .btn-intervene {
      background: #ff9800;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .btn-sound {
      background: #4caf50;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      margin-right: 8px;
    }

    .btn-sound.muted {
      background: #9e9e9e;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #999;
    }

    .empty-state-icon {
      font-size: 4rem;
      margin-bottom: 20px;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="human-panel-container">
    <!-- Panel Izquierdo: Lista de Chats -->
    <div class="chats-sidebar">
      <div class="chats-header">
        <h2>🧑‍💼 Panel Humano</h2>
        <p id="agentName">Dolce Party</p>
      </div>
      <div id="chatsList" class="chats-list">
        <div class="loading">Cargando chats...</div>
      </div>
    </div>

    <!-- Panel Derecho: Chat -->
    <div class="chat-main">
      <div id="chatHeader" class="chat-header" style="display: none;">
        <div class="chat-header-info">
          <h3 id="chatUserName">Selecciona un chat</h3>
          <p id="chatUserStatus">Esperando selección...</p>
        </div>
        <div class="chat-header-actions">
           <button id="btnSound" class="btn-sound" onclick="toggleSound()" title="Activar/desactivar sonido">
             🔊 Sonido
           </button>
           <button id="btnIntervene" class="btn-intervene" onclick="forceHandoff()" style="display: none;">
             ⏸️ Intervenir
           </button>
           <button id="btnResolve" class="btn-resolve" onclick="resolveHandoff()" style="display: none;">
             ✅ Resolver Handoff
           </button>
         </div>
      </div>

      <div id="chatMessages" class="chat-messages">
        <div class="empty-state">
          <div class="empty-state-icon">💬</div>
          <div>Selecciona un chat de la izquierda para comenzar</div>
        </div>
      </div>

      <div id="chatInputContainer" class="chat-input-container" style="display: none;">
        <input 
          type="text" 
          id="messageInput" 
          class="chat-input" 
          placeholder="Escribí tu mensaje como humano..."
          onkeypress="if(event.key==='Enter') sendMessage()"
        >
        <button class="btn-send" onclick="sendMessage()">Enviar</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/human-panel.js"></script>
</body>
</html>
